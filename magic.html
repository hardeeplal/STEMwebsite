<!DOCTYPE html>
<html>
<head>
<title>China Quiz</title>

<style>

body{
background-color:#FFD580;
font-family:Arial;
text-align:center;
margin:20px;
}

nav{
display:flex;
background-color:#FF8C00;
padding:10px 20px;
gap:20px;
border-radius:5px;
margin-bottom:20px;
justify-content:center;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
padding:5px 10px;
border-radius:3px;
}

nav a:hover{
background-color:#FF6F00;
}

.quizbox{
background-color:#FFC966;
padding:30px;
border-radius:10px;
max-width:650px;
margin:auto;
}

button{
display:block;
width:100%;
margin:10px 0;
padding:12px;
border:none;
border-radius:5px;
font-size:16px;
background-color:#FF8C00;
color:white;
cursor:pointer;
}

button:hover{
background-color:#FF6F00;
}

#score{
margin-top:15px;
font-size:18px;
font-weight:bold;
}

#einde{
font-size:24px;
margin-top:20px;
}

#progress{
font-size:20px;
margin-bottom:10px;
font-weight:bold;
color:#8B0000;
}

</style>

</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="fotos.html">Toeristische plaatsen</a>
<a href="magic.html">Quiz</a>
</nav>

<h1>China Quiz 🇨🇳</h1>

<div class="quizbox">

<p id="progress"></p>
<h2 id="vraag"></h2>

<div id="antwoorden"></div>

<p id="score"></p>
<p id="einde"></p>

<button id="restart" onclick="restartQuiz()" style="display:none;">Opnieuw spelen</button>

</div>

<script>

let vragen = [

{
vraag:"Wat is de hoofdstad van China?",
antwoorden:["Shanghai","Beijing","Chengdu","Hong Kong"],
correct:1
},

{
vraag:"Hoe heet de beroemde muur in China?",
antwoorden:["De Grote Muur","De Chinese Muur","De Ming Muur","De Rode Muur"],
correct:1
},

{
vraag:"Welke stad staat bekend om zijn panda's?",
antwoorden:["Chengdu","Shanghai","Beijing","Xi'an"],
correct:0
},

{
vraag:"Welk gerecht is beroemd in Beijing?",
antwoorden:["Dim Sum","Pekingeend","Hotpot","Kung Pao"],
correct:1
},

{
vraag:"Hoeveel inwoners heeft China ongeveer?",
antwoorden:["500 miljoen","900 miljoen","1,4 miljard","2 miljard"],
correct:2
},

{
vraag:"Wie is de president van China?",
antwoorden:["Kim Jong-un","Sanae Takaichi","Lee Jae Myung","Xi Jinping"],
correct:3
},

{
vraag:"In welke stad ligt de Verboden Stad?",
antwoorden:["Shanghai","Beijing","Xi'an","Guangzhou"],
correct:1
},

{
vraag:"Welke beroemde dieren komen uit China en leven in bamboebossen?",
antwoorden:["Tijgers","Panda's","Koala's","Kangoeroes"],
correct:1
},

{
vraag:"Welke rivier is de langste van China?",
antwoorden:["Gele Rivier","Yangtze","Mekong","Nijl"],
correct:1
},

{
vraag:"Met welk eetgerei eten mensen traditioneel in China?",
antwoorden:["Vork","Mes","Chopsticks","Lepel"],
correct:2
}

];

let huidigeVraag = 0;
let score = 0;

function laadVraag(){

let vraag = vragen[huidigeVraag];

document.getElementById("progress").innerText =
"Vraag " + (huidigeVraag + 1) + " / " + vragen.length;

document.getElementById("vraag").innerText = vraag.vraag;

let antwoordenHTML = "";

vraag.antwoorden.forEach((antwoord,index)=>{
antwoordenHTML += `<button onclick="checkAntwoord(${index})">${antwoord}</button>`;
});

document.getElementById("antwoorden").innerHTML = antwoordenHTML;

document.getElementById("score").innerText = "Score: " + score;

}

function checkAntwoord(index){

if(index === vragen[huidigeVraag].correct){
score++;
}

huidigeVraag++;

if(huidigeVraag < vragen.length){
laadVraag();
}
else{
toonEinde();
}

}

function toonEinde(){

document.getElementById("progress").innerText = "";
document.getElementById("vraag").innerText = "Quiz klaar!";
document.getElementById("antwoorden").innerHTML = "";
document.getElementById("score").innerText = "Jouw score: " + score + " / " + vragen.length;

if(score >= 8){
document.getElementById("einde").innerText = "🎉 Geweldig! Je kent China goed!";
}
else if(score >= 5){
document.getElementById("einde").innerText = "👍 Niet slecht!";
}
else{
document.getElementById("einde").innerText = "📚 Misschien nog wat meer leren over China!";
}

document.getElementById("restart").style.display="block";

}

function restartQuiz(){

huidigeVraag = 0;
score = 0;
document.getElementById("einde").innerText="";
document.getElementById("restart").style.display="none";

laadVraag();

}

laadVraag();

</script>

</body>
</html>
